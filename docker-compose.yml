name: i2p
services:
  i2p:
    image: 'purplei2p/i2pd:latest'
    container_name: i2p
    hostname: i2p
    restart: always
    user: i2p
    environment:
      - I2PD_HOME=/home/i2pd
      - DATA_DIR=/home/i2pd/data
    volumes:
      - "/var/lib/srv/$USER/docker/purplei2p/i2pd/latest/rootfs/data/i2p:/home/i2pd/data" 
    ports:
      - "7070:7070/tcp"      # Web interface
      - "4444:4444/tcp"      # HTTP Proxy
      - "4447:4447/tcp"      # SOCKS proxy
      - "7656:7656/tcp"      # SAM bridge
      - "2827:2827/tcp"      # BOB command channel 
      - "7654:7654/tcp"      # I2CP server
      - "7650:7650/tcp"      # I2P control service
    logging:
      driver: "json-file"
      options:
        max-size: 5m
        max-file: 1

networks:
  i2p:
    name: i2p
